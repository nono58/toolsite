<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Pomodoro Timer – Free Focus Timer Online | QuickTools</title>
<meta name="description" content="Free online Pomodoro timer with focus sessions, short breaks, and long breaks. Customizable intervals, sound alerts, and session tracking."/>
<link rel="stylesheet" href="tool.css"/>
<style>
  .pomo-wrap { max-width:480px; margin:0 auto; text-align:center; }
  .mode-tabs { display:flex; gap:8px; justify-content:center; margin-bottom:28px; }
  .mode-tab { padding:8px 20px; border-radius:20px; border:1px solid var(--border); background:var(--bg2); color:var(--muted); font-size:.84rem; cursor:pointer; transition:.2s; }
  .mode-tab.active { background:var(--accent); border-color:var(--accent); color:#fff; }
  .clock-ring { position:relative; width:240px; height:240px; margin:0 auto 28px; }
  .clock-ring svg { position:absolute; inset:0; transform:rotate(-90deg); }
  .clock-center { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .time-display { font-size:3.2rem; font-weight:800; letter-spacing:-.02em; color:var(--text); line-height:1; font-variant-numeric:tabular-nums; }
  .mode-label { font-size:.82rem; color:var(--muted); margin-top:4px; }
  .ctrl-row { display:flex; gap:12px; justify-content:center; margin-bottom:24px; }
  .pomo-btn { width:56px; height:56px; border-radius:50%; border:none; font-size:1.4rem; cursor:pointer; transition:.15s; }
  .pomo-btn.primary { background:var(--accent); color:#fff; box-shadow:0 4px 20px rgba(99,102,241,.4); }
  .pomo-btn.primary:hover { background:var(--accent2); }
  .pomo-btn.secondary { background:var(--bg2); border:1px solid var(--border); color:var(--muted); }
  .pomo-btn.secondary:hover { border-color:var(--accent); color:var(--text); }
  .sessions-row { display:flex; gap:6px; justify-content:center; margin-bottom:20px; }
  .dot { width:12px; height:12px; border-radius:50%; background:var(--bg3); border:1px solid var(--border); transition:.3s; }
  .dot.done { background:var(--accent); border-color:var(--accent); }
  .stats-row { display:flex; gap:20px; justify-content:center; margin-bottom:20px; }
  .stat { text-align:center; }
  .stat-num { font-size:1.6rem; font-weight:800; color:var(--accent2); }
  .stat-lbl { font-size:.75rem; color:var(--muted); }
  .settings-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-top:20px; }
  .setting-card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:12px; }
  .setting-card label { font-size:.75rem; color:var(--muted); display:block; margin-bottom:6px; }
  .setting-card input { width:100%; background:var(--bg3); color:var(--text); border:1px solid var(--border); border-radius:6px; padding:6px; text-align:center; font-size:1rem; font-weight:700; }
</style>
</head>
<body>
<header><a class="logo" href="index.html">⚡ Quick<span>Tools</span></a></header>
<main>
  <h1 class="tool-title">Pomodoro Timer</h1>
  <p class="tool-desc">Stay focused with the Pomodoro technique — 25-minute work sessions with short breaks.</p>

  <div class="card">
    <div class="pomo-wrap">

      <div class="mode-tabs">
        <div class="mode-tab active" data-mode="work">🍅 Focus</div>
        <div class="mode-tab" data-mode="short">☕ Short Break</div>
        <div class="mode-tab" data-mode="long">🌿 Long Break</div>
      </div>

      <div class="clock-ring">
        <svg viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="120" cy="120" r="108" stroke="var(--bg3)" stroke-width="10"/>
          <circle id="progress-ring" cx="120" cy="120" r="108" stroke="var(--accent)" stroke-width="10"
            stroke-linecap="round" stroke-dasharray="678.6" stroke-dashoffset="0" style="transition:stroke-dashoffset .5s linear;"/>
        </svg>
        <div class="clock-center">
          <div class="time-display" id="time-display">25:00</div>
          <div class="mode-label" id="mode-label">Focus Session</div>
        </div>
      </div>

      <div class="sessions-row" id="dots"></div>

      <div class="ctrl-row">
        <button class="pomo-btn secondary" id="reset-btn" title="Reset">⏮</button>
        <button class="pomo-btn primary" id="start-btn">▶</button>
        <button class="pomo-btn secondary" id="skip-btn" title="Skip">⏭</button>
      </div>

      <div class="stats-row">
        <div class="stat"><div class="stat-num" id="total-sessions">0</div><div class="stat-lbl">Sessions</div></div>
        <div class="stat"><div class="stat-num" id="total-focus">0</div><div class="stat-lbl">Focus min</div></div>
        <div class="stat"><div class="stat-num" id="total-cycles">0</div><div class="stat-lbl">Cycles</div></div>
      </div>

      <div class="settings-grid">
        <div class="setting-card">
          <label>🍅 Focus (min)</label>
          <input type="number" id="work-min" value="25" min="1" max="90"/>
        </div>
        <div class="setting-card">
          <label>☕ Short break</label>
          <input type="number" id="short-min" value="5" min="1" max="30"/>
        </div>
        <div class="setting-card">
          <label>🌿 Long break</label>
          <input type="number" id="long-min" value="15" min="1" max="60"/>
        </div>
      </div>

    </div>
  </div>
</main>

<script>
const MODES = {
  work:  { label:'Focus Session',   color:'var(--accent)' },
  short: { label:'Short Break',     color:'#22c55e' },
  long:  { label:'Long Break',      color:'#06b6d4' },
};
const CIRCUMFERENCE = 2 * Math.PI * 108;

let mode = 'work';
let running = false;
let timer = null;
let totalSeconds = 0, remaining = 0;
let sessionCount = 0, totalFocus = 0, cycleCount = 0;
let sessionInCycle = 0;

const ring = document.getElementById('progress-ring');
ring.style.strokeDasharray = CIRCUMFERENCE;

function getDurations() {
  return {
    work:  parseInt(document.getElementById('work-min').value)||25,
    short: parseInt(document.getElementById('short-min').value)||5,
    long:  parseInt(document.getElementById('long-min').value)||15,
  };
}

function setMode(m) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode===m));
  ring.style.stroke = MODES[m].color;
  document.getElementById('mode-label').textContent = MODES[m].label;
  const dur = getDurations()[m];
  totalSeconds = dur * 60;
  remaining = totalSeconds;
  updateDisplay();
  updateRing();
  if(running) { clearInterval(timer); running=false; document.getElementById('start-btn').textContent='▶'; }
}

function updateDisplay() {
  const m = Math.floor(remaining/60), s = remaining%60;
  document.getElementById('time-display').textContent = String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  document.title = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')} – Pomodoro`;
}

function updateRing() {
  const pct = remaining / totalSeconds;
  ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);
}

function updateDots() {
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML='';
  for(let i=0;i<4;i++){
    const d=document.createElement('div'); d.className='dot'+(i<sessionInCycle?' done':''); dotsEl.appendChild(d);
  }
}

function beep(type='work') {
  const ctx = new (window.AudioContext||window.webkitAudioContext)();
  const tones = type==='work' ? [880,660] : [440,660];
  tones.forEach((f,i) => {
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type='sine'; o.frequency.value=f;
    g.gain.setValueAtTime(0.3,ctx.currentTime+i*.22);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.22+.3);
    o.start(ctx.currentTime+i*.22); o.stop(ctx.currentTime+i*.22+.35);
  });
}

function tick() {
  if(remaining<=0) {
    clearInterval(timer); running=false;
    document.getElementById('start-btn').textContent='▶';
    beep(mode);
    if(mode==='work') {
      totalFocus += getDurations().work;
      sessionCount++; sessionInCycle++;
      document.getElementById('total-sessions').textContent=sessionCount;
      document.getElementById('total-focus').textContent=totalFocus;
      updateDots();
      if(sessionInCycle>=4) {
        cycleCount++; sessionInCycle=0;
        document.getElementById('total-cycles').textContent=cycleCount;
        setMode('long');
      } else {
        setMode('short');
      }
    } else {
      setMode('work');
    }
    return;
  }
  remaining--;
  updateDisplay();
  updateRing();
}

document.getElementById('start-btn').addEventListener('click', () => {
  if(running) {
    clearInterval(timer); running=false; document.getElementById('start-btn').textContent='▶';
  } else {
    if(remaining===0) { totalSeconds=(getDurations()[mode])*60; remaining=totalSeconds; }
    running=true; document.getElementById('start-btn').textContent='⏸';
    timer=setInterval(tick,1000);
  }
});

document.getElementById('reset-btn').addEventListener('click', () => {
  clearInterval(timer); running=false; document.getElementById('start-btn').textContent='▶';
  totalSeconds=(getDurations()[mode])*60; remaining=totalSeconds; updateDisplay(); updateRing();
});

document.getElementById('skip-btn').addEventListener('click', () => {
  clearInterval(timer); running=false; document.getElementById('start-btn').textContent='▶';
  const modes=['work','short','long'];
  const idx=modes.indexOf(mode);
  setMode(modes[(idx+1)%3]);
});

document.querySelectorAll('.mode-tab').forEach(t => {
  t.addEventListener('click', () => setMode(t.dataset.mode));
});

['work-min','short-min','long-min'].forEach(id => {
  document.getElementById(id).addEventListener('change', () => {
    const m = id.replace('-min','').replace('work','work').replace('short','short').replace('long','long');
    if(m===mode) setMode(mode);
  });
});

setMode('work');
updateDots();
</script>
</body>
</html>
