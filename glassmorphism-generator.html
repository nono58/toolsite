<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Glassmorphism Generator – CSS Glass Effect Builder | QuickTools</title>
<meta name="description" content="Generate glassmorphism CSS effects online for free. Adjust blur, transparency, border, and background. Copy ready-to-use CSS code instantly."/>
<link rel="stylesheet" href="tool.css"/>
<style>
  .gen-layout { display:grid; grid-template-columns:300px 1fr; gap:20px; }
  @media(max-width:700px){ .gen-layout { grid-template-columns:1fr; } }
  .preview-area {
    border-radius:14px; border:1px solid var(--border);
    min-height:380px; display:flex; align-items:center; justify-content:center;
    position:relative; overflow:hidden;
    background: linear-gradient(135deg,#667eea 0%,#764ba2 50%,#f093fb 100%);
  }
  .glass-card {
    padding:40px 36px; border-radius:16px; text-align:center;
    color:#fff; min-width:220px; max-width:340px;
    transition:all .3s;
  }
  .glass-card h3 { margin:0 0 8px; font-size:1.3rem; }
  .glass-card p  { margin:0; font-size:.9rem; opacity:.85; }
  .bg-blob { position:absolute; border-radius:50%; filter:blur(40px); pointer-events:none; }
  .controls-col label { display:block; font-size:.82rem; color:var(--muted); margin-bottom:4px; margin-top:14px; }
  .controls-col input[type=range] { width:100%; accent-color:var(--accent); }
  .val-display { float:right; color:var(--accent2); font-weight:600; font-size:.82rem; }
  .css-output { margin-top:12px; background:var(--bg3); border-radius:8px; padding:14px; font-family:monospace; font-size:.78rem; color:var(--text); white-space:pre; overflow-x:auto; line-height:1.6; border:1px solid var(--border); }
  .bg-presets { display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
  .bg-preset { width:32px; height:32px; border-radius:6px; border:2px solid transparent; cursor:pointer; }
  .bg-preset:hover,.bg-preset.active { border-color:var(--accent); }
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7091279251828395" crossorigin="anonymous"></script>
</head>
<body>
<header><a class="logo" href="index.html">⚡ Quick<span>Tools</span></a></header>
<main>
  <h1 class="tool-title">Glassmorphism Generator</h1>
  <p class="tool-desc">Design frosted-glass UI cards with live preview. Tweak blur, opacity, border, and shadow — then copy the CSS.</p>

  <div class="card">
    <div class="gen-layout">
      <div class="controls-col">
        <label>Background blur <span class="val-display" id="blur-val">12px</span></label>
        <input type="range" id="blur" min="0" max="40" value="12"/>

        <label>Card opacity <span class="val-display" id="opacity-val">0.18</span></label>
        <input type="range" id="opacity" min="0" max="60" value="18"/>

        <label>Border opacity <span class="val-display" id="border-op-val">0.25</span></label>
        <input type="range" id="border-op" min="0" max="100" value="25"/>

        <label>Border radius <span class="val-display" id="radius-val">16px</span></label>
        <input type="range" id="radius" min="0" max="40" value="16"/>

        <label>Shadow spread <span class="val-display" id="shadow-val">20px</span></label>
        <input type="range" id="shadow" min="0" max="60" value="20"/>

        <label>Card color</label>
        <div style="display:flex;gap:8px;align-items:center">
          <input type="color" id="card-color" value="#ffffff" style="width:44px;height:36px;border:none;border-radius:6px;cursor:pointer;"/>
          <span style="font-size:.8rem;color:var(--muted)">Base tint</span>
        </div>

        <label>Background preset</label>
        <div class="bg-presets" id="bg-presets"></div>

        <div style="margin-top:16px">
          <button class="btn-primary" id="copy-btn" style="width:100%">📋 Copy CSS</button>
        </div>
      </div>

      <div>
        <div class="preview-area" id="preview">
          <div class="bg-blob" style="width:200px;height:200px;background:#a855f7;top:-60px;right:-40px;opacity:.6;"></div>
          <div class="bg-blob" style="width:160px;height:160px;background:#3b82f6;bottom:-40px;left:-20px;opacity:.5;"></div>
          <div class="glass-card" id="glass-card">
            <h3>✨ Glass Effect</h3>
            <p>Frosted glass UI component<br/>ready for your design.</p>
          </div>
        </div>
        <div class="css-output" id="css-out"></div>
      </div>
    </div>
  </div>
</main>

<script>
const BG_PRESETS = [
  {label:'Purple',css:'linear-gradient(135deg,#667eea,#764ba2,#f093fb)'},
  {label:'Sunset',css:'linear-gradient(135deg,#f093fb,#f5576c,#fda085)'},
  {label:'Ocean',css:'linear-gradient(135deg,#4facfe,#00f2fe,#a1ffce)'},
  {label:'Forest',css:'linear-gradient(135deg,#43e97b,#38f9d7,#667eea)'},
  {label:'Fire',css:'linear-gradient(135deg,#f7971e,#ffd200,#f64f59)'},
  {label:'Night',css:'linear-gradient(135deg,#0f0c29,#302b63,#24243e)'},
];

let activeBg = 0;

const presetsEl = document.getElementById('bg-presets');
BG_PRESETS.forEach((bg,i) => {
  const d = document.createElement('div');
  d.className='bg-preset'+(i===0?' active':'');
  d.style.background = bg.css;
  d.title = bg.label;
  d.addEventListener('click', () => {
    activeBg=i;
    document.getElementById('preview').style.background=bg.css;
    document.querySelectorAll('.bg-preset').forEach((b,j)=>b.classList.toggle('active',j===i));
  });
  presetsEl.appendChild(d);
});

function hexToRgb(hex) {
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function update() {
  const blur = document.getElementById('blur').value;
  const opacity = (document.getElementById('opacity').value/100).toFixed(2);
  const borderOp = (document.getElementById('border-op').value/100).toFixed(2);
  const radius = document.getElementById('radius').value;
  const shadow = document.getElementById('shadow').value;
  const color = document.getElementById('card-color').value;
  const {r,g,b} = hexToRgb(color);

  document.getElementById('blur-val').textContent = blur+'px';
  document.getElementById('opacity-val').textContent = opacity;
  document.getElementById('border-op-val').textContent = borderOp;
  document.getElementById('radius-val').textContent = radius+'px';
  document.getElementById('shadow-val').textContent = shadow+'px';

  const card = document.getElementById('glass-card');
  const bg = `rgba(${r},${g},${b},${opacity})`;
  const bd = `1px solid rgba(${r},${g},${b},${borderOp})`;
  const sh = `0 ${Math.round(shadow*.4)}px ${shadow}px rgba(0,0,0,0.25)`;
  const bk = `blur(${blur}px)`;

  card.style.background = bg;
  card.style.border = bd;
  card.style.borderRadius = radius+'px';
  card.style.boxShadow = sh;
  card.style.backdropFilter = bk;
  card.style.webkitBackdropFilter = bk;

  const css = `.glass {
  background: rgba(${r}, ${g}, ${b}, ${opacity});
  backdrop-filter: blur(${blur}px);
  -webkit-backdrop-filter: blur(${blur}px);
  border: 1px solid rgba(${r}, ${g}, ${b}, ${borderOp});
  border-radius: ${radius}px;
  box-shadow: 0 ${Math.round(shadow*.4)}px ${shadow}px rgba(0, 0, 0, 0.25);
}`;
  document.getElementById('css-out').textContent = css;
}

['blur','opacity','border-op','radius','shadow'].forEach(id => {
  document.getElementById(id).addEventListener('input', update);
});
document.getElementById('card-color').addEventListener('input', update);

document.getElementById('copy-btn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('css-out').textContent);
  const btn = document.getElementById('copy-btn');
  btn.textContent='✅ Copied!'; setTimeout(()=>btn.textContent='📋 Copy CSS',1800);
});

update();
</script>
</body>
</html>
